# inferencia — configuration
#
# inferencia is the API gateway in front of local LLM and TTS backends.
# Default chat model fallback (when request.model is omitted): qwen3.6:35b-a3b-coding-bf16.
# Copy this file to config.yaml and adjust as needed.
# Environment variables (INFERENCIA_*) override file values.
#
# TTS backends can be configured either via the `tts_backends` section below
# or via INFERENCIA_KOKORO_URL, INFERENCIA_CHATTERBOX_URL env vars.

server:
  host: "127.0.0.1"
  port: 8080
  read_timeout: 30s
  write_timeout: 120s   # Long timeout for streaming responses.

auth:
  keys_file: "./keys.txt" # One API key per line. Lines starting with # are ignored.

backends:
  - name: "ollama"
    type: "ollama"
    url: "http://localhost:11434"
    timeout: 60s

# TTS backends (optional). Each is an HTTP server exposing OpenAI-compatible
# /v1/audio/speech and /v1/models endpoints.
tts_backends:
  - name: "kokoro"
    url: "http://localhost:50051"
    timeout: 30s
  # - name: "chatterbox"
  #   url: "http://localhost:50052"
  #   timeout: 30s

ratelimit:
  requests_per_second: 10
  burst: 20

log:
  level: "info"       # debug | info | warn | error
  format: "json"      # json | text
  # cloud_format: ""  # "" | gcp | gcp_with_resource — add severity (and resource) for GCP Cloud Logging

# Watchdog: background health-check loop for all backends.
# Pings /health every interval. After fail_threshold consecutive failures
# a backend is marked DEGRADED and removed from auto-rotation.
watchdog:
  interval: 30s
  fail_threshold: 3
  request_timeout: 5s

# Metrics: GET /metrics is always enabled (no auth). Optional tracing below.
observability:
  otel_enabled: false
  otel_endpoint: "http://localhost:4318"   # http = insecure (local); https = TLS (prod)
  otel_service_name: "inferencia"
